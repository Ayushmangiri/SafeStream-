services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
  
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=4000
      - AI_SERVICE_URL=http://ai-service:8001
    depends_on:
      - ai-service
  
  ai-service:
    build: ./backend/ai_service
    ports:
      - "8001:8001"
